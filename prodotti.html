<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Prodotti - Laruccia</title>

  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;600&family=Manrope:wght@300;500&display=swap" rel="stylesheet">
</head>

<body>

  <div id="navbar"></div>

  <nav class="product-nav">
    <div class="product-nav-container">
      <a href="#ceramiche">Ceramiche</a>
      <a href="#pietre">Pietre</a>
      <a href="#parquet">Parquet</a>
      <a href="#cartadaparati">Carta da Parati</a>
      <a href="#sanitari">Sanitari</a>
      <a href="#rubinetteria">Rubinetteria</a>
      <a href="#arredobagno">Arredo Bagno</a>
      <a href="#box-doccia">Box Doccia</a>
      <a href="#wellness">Wellness</a>
      <a href="#radiatori">Radiatori</a>
      <a href="#specchi">Specchi</a>
      <a href="#accessoribagno">Accessori Bagno</a>
    </div>
  </nav>

  <section class="search-section">
    <div class="container">
      <div class="search-wrapper">

        <input
          type="text"
          id="brandSearch"
          placeholder="Cerca un brand..."
          autocomplete="off">

        <div id="searchSuggestions" class="search-suggestions"></div>

        <span class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>

      </div>
    </div>
  </section>

  <main class="prodotti-layout">
    <div id="productsRoot"></div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/products-data.js"></script>
  <script src="js/products-render.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
