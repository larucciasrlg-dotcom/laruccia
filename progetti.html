<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progetti - Laruccia</title>
  <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;600&family=Manrope:wght@300;500&display=swap" rel="stylesheet">

</head>
<body>

 <!-- NAVBAR -->
<div id="navbar"></div>

  <!-- Hero vuota o assente -->
  <section class="hero no-hero">
  </section>


<div id="footer-placeholder"></div>
  <div class="cookie-banner" id="cookieBanner">

  <div class="cookie-content">

    <div class="cookie-text">
      <h4>Cookie & Privacy</h4>

      <p>
        Utilizziamo cookie tecnici e di analisi per migliorare
        l’esperienza di navigazione e comprendere l’utilizzo del sito.
      </p>
    </div>

    <div class="cookie-actions">

      <button class="cookie-btn secondary" id="rejectCookies">
        Rifiuta
      </button>

      <button class="cookie-btn secondary" id="preferencesCookies">
        Preferenze
      </button>

      <button class="cookie-btn primary" id="acceptCookies">
        Accetta
      </button>

    </div>

  </div>

</div>
<script src="js/script.js"></script>
