<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Laruccia</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300..900;1,300..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="home">

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- HERO (FULL WIDTH - CORRETTA COSÌ) -->
  <section class="hero">
    
    <div class="hero-slides">
      <div class="hero-slide active">
        <img src="img/hero.jpg" alt="Superfici di design Laruccia">
        <div class="hero-overlay"></div>
      </div>

      <div class="hero-slide">
        <img src="img/gallery1.jpg" alt="Arredo Bagno eccellenza Laruccia">
        <div class="hero-overlay"></div>
      </div>

      <div class="hero-slide">
        <img src="img/gallery2.jpg" alt="Soluzioni Outdoor Laruccia">
        <div class="hero-overlay"></div>
      </div>
    </div>

    <div class="hero-content-wrapper">
      <div class="hero-content">
        <h1 class="hero-logo">
          <img src="img/logo-bianco.png" alt="Laruccia">
        </h1>

        <div class="hero-btns">
          <a href="prodotti.html" class="btn-primary">Esplora le Collezioni</a>
          <a href="contatti.html" class="btn-secondary">Prenota una Visita</a>
        </div>
      </div>
    </div>

    <div class="scroll-indicator">
      <div class="mouse"></div>
      <span>Scopri di più</span>
    </div>

  </section>

<!-- INTRO VELOCE IN HOME -->
<section class="home-intro" style="padding: 100px 0; text-align: center; background: #000;">
  <div class="container">
    <h2 style="font-family: var(--font-titles); margin-bottom: 20px;">Oltre 75 anni di Design</h2>
    <p style="max-width: 700px; margin: 0 auto 30px; opacity: 0.8;">
      Dal 1939, Laruccia trasforma gli spazi con superfici e arredamenti d'eccellenza.
    </p>
    <a href="chi-siamo.html" class="btn-secondary">Scopri la nostra storia</a>
  </div>
</section>

  <!-- CATEGORIE -->
  <section class="home-categories">
    
    <!-- CONTAINER AGGIUNTO -->
    <div class="container">

      <div class="cat-header">
        <h2>Collezioni</h2>
      </div>

      <div class="cat-grid">

        <div class="cat-card">
          <img src="img/cerasa.jpg" alt="Arredo Bagno">
          <div class="cat-overlay">
            <h3>Arredo Bagno</h3>
            <p>Wellness & Design</p>
          </div>
        </div>

        <div class="cat-card">
          <img src="img/kronos.jpg" alt="Superfici">
          <div class="cat-overlay">
            <h3>Superfici</h3>
            <p>Ceramiche & Marmi</p>
          </div>
        </div>

        <div class="cat-card">
          <img src="img/effegibi.jpg" alt="Outdoor">
          <div class="cat-overlay">
            <h3>Soluzioni Outdoor</h3>
            <p>Vivere l'esterno</p>
          </div>
        </div>

      </div>

    </div>

  </section>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- JS -->
  <script src="js/script.js"></script>

</body>
</html>
