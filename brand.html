<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Brand - Laruccia</title>
    <!-- Aggiungi ?v=1.1 alla fine per forzare l'aggiornamento estetico -->
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;600&family=Manrope:wght@300;500&display=swap" rel="stylesheet">
</head>
<body class="brand-detail-page">

    <div id="navbar"></div>
    <div id="lista-brand-ceramiche" class="brand-grid-mini"></div>

    <main id="brand-content">
        <section class="brand-hero">
            <div class="container">
                <div class="brand-hero-grid">
                    <div class="brand-info-box">
                        <h1 id="brand-title"></h1> <!-- Riempito da JS -->
                        <div class="brand-description-wrapper">
                            <p id="brand-description"></p> <!-- Riempito da JS -->
                        </div>
                        <a id="brand-link" href="#" target="_blank" class="btn-primary">
                            Visita il sito ufficiale <span>→</span>
                        </a>
                    </div>
                    <div class="brand-image-featured">
                        <img id="brand-main-img" src="" alt=""> <!-- Riempito da JS -->
                    </div>
                </div>
            </div>
        </section>

        <section class="brand-gallery-section">
            <div class="container">
                <h2 class="section-title">Collezioni & Ispirazioni</h2>
                <div id="brand-gallery" class="gallery-grid">
                    <!-- Le immagini della galleria verranno inserite qui dal JS -->
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
</body>
</html>
