<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dettaglio Brand - Laruccia</title>

  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;600&family=Manrope:wght@300;500&display=swap" rel="stylesheet">
</head>

<body class="brand-detail-page">

  <div id="navbar"></div>

  <main class="brand-page">

    <!-- HERO -->
    <section class="brand-hero">
      <div class="container">

        <div class="brand-hero-grid">

          <!-- INFO -->
          <div class="brand-content">

            <div class="brand-kicker fade-up">
              Collezione Selezionata
            </div>

            <h1 id="brand-title" class="brand-title fade-up stagger-1"></h1>

            <div class="brand-description-wrapper fade-up stagger-2">
              <p id="brand-description" class="brand-description"></p>
            </div>

            <div class="brand-actions fade-up stagger-3">
              <a
                id="brand-link"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                class="brand-link">
                Visita il sito ufficiale
              </a>
            </div>

          </div>

          <!-- IMAGE -->
          <div class="brand-image-featured image-reveal stagger-2">
            <img
              id="brand-main-img"
              class="brand-main-img"
              src=""
              alt="">
          </div>

        </div>

      </div>
    </section>


    
    <!-- GALLERY -->
    <section class="brand-gallery-section">
      <div class="container">

        <header class="gallery-header">

          <span class="section-label fade-up">
            Ispirazioni
          </span>

          <h2 class="gallery-title fade-up stagger-1">
            Collezioni & Ambienti
          </h2>

          <p class="gallery-description fade-up stagger-2">
            Una selezione di ambientazioni e superfici per raccontare il linguaggio estetico del brand.
          </p>

          <div class="gallery-more">
  <a id="brand-collections-link"
     class="gallery-more-btn"
     target="_blank">
     Scopri tutte le collezioni
  </a>
</div>

        </header>

        
        <div id="brand-gallery" class="gallery-grid">
  <!-- JS -->
</div>


        <nav class="brand-page-nav" aria-label="Navigazione tra collezioni">
          <a
            id="brand-prev-link"
            class="brand-nav-link brand-nav-link-prev"
            href="#">
            <span class="brand-nav-arrow" aria-hidden="true"></span>
            <span class="brand-nav-text">
              <small>Collezione precedente</small>
              <strong id="brand-prev-name"></strong>
            </span>
          </a>

          <a
            id="brand-next-link"
            class="brand-nav-link brand-nav-link-next"
            href="#">
            <span class="brand-nav-text">
              <small>Prossima collezione</small>
              <strong id="brand-next-name"></strong>
            </span>
            <span class="brand-nav-arrow" aria-hidden="true"></span>
          </a>
        </nav>

      </div>
    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="js/brand-data.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
